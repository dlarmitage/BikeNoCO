name: BikeNoCo
options:
  bundleIdPrefix: com.darmitage
  deploymentTarget:
    iOS: "17.0"

targets:
  BikeNoCo:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BikeNoCo
    info:
      path: BikeNoCo/Resources/Info.plist
      properties:
        CFBundleDisplayName: BikeNoCo
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: "Used to show your position on the map and to record your rides."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Used to continue recording your ride when the app is in the background."
        UIBackgroundModes:
          - location
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.darmitage.BikeNoCo
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        SWIFT_STRICT_CONCURRENCY: minimal
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ZTL3N8J879
        CODE_SIGN_IDENTITY: "Apple Development"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
